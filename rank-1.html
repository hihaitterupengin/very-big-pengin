<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>명예의 전당 - Play Minigames</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 py-12">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
        <h2 class="text-2xl font-bold mb-6 text-slate-800 flex items-center gap-2">
            <i class="fa-solid fa-trophy text-amber-500"></i> 틱택토 명예의 전당
        </h2>
        <table class="w-full text-left">
            <thead>
                <tr class="border-b border-slate-200 text-slate-500 text-sm">
                    <th class="pb-3">순위</th>
                    <th class="pb-3">기록 시간</th>
                
                </tr>
            </thead>
            <tbody id="ranking-body">
                <!-- 데이터가 여기 들어옵니다 -->
            </tbody>
        </table>
        <div class="mt-8">
            <a href="index.html" class="text-blue-600 font-semibold hover:underline">← 메인으로 돌아가기</a>
        </div>
    </div>

<script>
    const STORAGE_KEY = 'TICTACTOE_RANKING_DATA'; // 💡 여기도 반드시 똑같이!
    const myId = localStorage.getItem('tictactoeUserId');
    const list = document.getElementById('ranking-body');
    // 데이터 불러오기
    const savedData = localStorage.getItem(STORAGE_KEY);
    const rankings = savedData ? JSON.parse(savedData) : [];
    
    console.log("🔍 불러온 랭킹 데이터:", rankings); // 💡 데이터가 제대로 들어오는지 확인

    if (rankings.length === 0) {
        list.innerHTML = '<p class="text-slate-500 text-center">아직 기록이 없습니다.</p>';
    } else {
        list.innerHTML = '';
        rankings.forEach((r, i) => {
            const isMine = (r.userId === myId);
            list.innerHTML += `
                <div class="p-4 mb-2 rounded-lg border ${isMine ? 'bg-blue-50 border-blue-200' : 'bg-white border-slate-200'} shadow-sm">
                    <div class="flex justify-between">
                        <span class="font-bold">${i+1}등 ${r.name} ${isMine ? '(나)' : ''}</span>
                        <span class="font-mono font-bold text-blue-600">${r.time}초</span>
                    </div>
                </div>`;
        });
    }
</script>
</body>
</html>
